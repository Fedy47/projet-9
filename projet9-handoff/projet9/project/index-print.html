<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FERROUS — Industrial OS · Print</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />

  <style>
    html, body { margin: 0; padding: 0; background: #0B0C0D; min-height: 100vh; font-family: 'Inter', system-ui, sans-serif; color-scheme: dark; }
    #root { min-height: 100vh; }

    /* Each artboard sits on its own page, sized to native dimensions */
    @page pg-landing  { size: 1440px 5200px; margin: 0; }
    @page pg-gallery  { size: 1440px 1800px; margin: 0; }
    @page pg-estim    { size: 1440px 1480px; margin: 0; }
    @page pg-client   { size: 1440px 1100px; margin: 0; }
    @page pg-admin    { size: 1440px 1400px; margin: 0; }
    @page pg-mobile   { size: 1440px 820px;  margin: 0; }

    .print-stack { display: flex; flex-direction: column; }
    .print-page { width: 1440px; position: relative; }
    .pg-landing  { height: 5200px; page: pg-landing; }
    .pg-gallery  { height: 1800px; page: pg-gallery; break-before: page; }
    .pg-estim    { height: 1480px; page: pg-estim;   break-before: page; }
    .pg-client   { height: 1100px; page: pg-client;  break-before: page; }
    .pg-admin    { height: 1400px; page: pg-admin;   break-before: page; }
    .pg-mobile   { height: 820px;  page: pg-mobile;  break-before: page; }

    /* Screen-only frame around each page so the user can preview before printing */
    @media screen {
      body { padding: 32px; background: #1a1a1c; }
      .print-stack { gap: 28px; }
      .print-page {
        background: #0B0C0D;
        box-shadow: 0 12px 40px rgba(0,0,0,0.5);
        outline: 1px solid rgba(255,255,255,0.06);
      }
    }

    /* Print rules */
    @media print {
      body { background: #0B0C0D; padding: 0; }
      .print-stack { gap: 0; }
      .print-page { box-shadow: none; outline: 0; }
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      /* kill animations */
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="landing.jsx"></script>
  <script type="text/babel" src="gallery.jsx"></script>
  <script type="text/babel" src="estimator.jsx"></script>
  <script type="text/babel" src="client.jsx"></script>
  <script type="text/babel" src="admin.jsx"></script>
  <script type="text/babel" src="mobile.jsx"></script>

  <script type="text/babel">
    function PrintApp() {
      return (
        <div className="print-stack">
          <div className="print-page pg-landing"><LandingArtboard /></div>
          <div className="print-page pg-gallery"><GalleryArtboard /></div>
          <div className="print-page pg-estim"><EstimatorArtboard /></div>
          <div className="print-page pg-client"><ClientPortalArtboard /></div>
          <div className="print-page pg-admin"><AdminArtboard /></div>
          <div className="print-page pg-mobile"><MobileArtboard /></div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<PrintApp />);

    // Auto-print after fonts load + grace period
    (async () => {
      try { await document.fonts.ready; } catch (e) {}
      await new Promise(r => setTimeout(r, 800));
      window.print();
    })();
  </script>
</body>
</html>
